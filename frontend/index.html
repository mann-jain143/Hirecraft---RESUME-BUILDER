<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <meta name="description" content="HireCraftt is an AI-powered Career Operating System that helps students and professionals build resumes, optimize ATS scores, prepare for interviews, generate portfolios, track job applications, analyze skill gaps, receive AI career guidance, and ultimately land their dream jobs." />
    <meta name="keywords" content="career accelerator, AI career coach, resume builder, AI resume, ATS friendly, professional resume, CV maker, HireCraftt" />
    <meta name="author" content="HireCraftt" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:title" content="HireCraftt — AI Career Operating System" />
    <meta property="og:description" content="Accelerate your career with AI-powered resume builder, career coach, portfolio suite, and job tracker." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Merriweather:wght@400;700&family=Roboto:wght@400;500;700&family=Lato:wght@400;700&family=Open+Sans:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>HireCraftt — AI Career Operating System</title>
  </head>
  <body>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('hirecraftt-theme') || 'dark';
          var root = document.documentElement;
          root.classList.add(theme);
          if (theme !== 'light') {
            root.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
